<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TabsCopy</h1>
      <p class="subtitle" id="subtitle"></p>
    </header>

    <section class="copy-section">
      <button id="copy-btn" class="copy-btn"></button>
      <div id="copy-status" class="copy-status"></div>
    </section>

    <section class="setting-group">
      <label class="setting-label" id="label-format"></label>
      <div id="format-chips" class="chips"></div>
    </section>

    <section class="setting-group">
      <label class="setting-label" id="label-scope"></label>
      <select id="scope-select" class="select"></select>
    </section>

    <section class="setting-group">
      <div class="toggle-row">
        <div>
          <div class="toggle-label" id="label-pinned"></div>
          <div class="toggle-desc" id="desc-pinned"></div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="pinned-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <footer>
      <label class="setting-label" id="label-shortcuts"></label>
      <div id="shortcuts-list" class="shortcuts-list"></div>
      <p class="shortcuts-hint" id="hint-shortcuts"></p>
      <div class="shortcuts-actions">
        <button id="configure-shortcuts-btn" class="configure-btn"></button>
      </div>
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
