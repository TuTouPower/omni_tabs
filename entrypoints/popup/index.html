<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TabsCopy</h1>
      <p class="subtitle">Smart Tab Copier</p>
    </header>

    <section class="setting-group">
      <label class="setting-label">Default Format</label>
      <div id="format-chips" class="chips"></div>
    </section>

    <section class="setting-group">
      <label class="setting-label">Default Scope</label>
      <select id="scope-select" class="select"></select>
    </section>

    <section class="setting-group">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Include Pinned Tabs</div>
          <div class="toggle-desc">Default: exclude pinned tabs</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="pinned-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <footer>
      <label class="setting-label">Shortcuts</label>
      <div id="shortcuts-list" class="shortcuts-list"></div>
      <p class="shortcuts-hint">Customize in browser extension settings</p>
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
